<!--
    base_public.html
    -----------------
    NEW FILE created during the landing-page cleanup.

    Why this exists: landing.html was previously extending "base.html", which
    is actually the authenticated DASHBOARD shell (fixed sidebar with its own
    DHICMS logo, its own nav links, and its own Sign in / Register buttons in
    the topbar). Extending it caused the dashboard's sidebar/topbar chrome to
    be rendered around the public landing page's own navbar/hero, which is
    exactly what produced the duplicate navigation bars, duplicate DHICMS
    branding, and duplicate Sign In / Register buttons reported.

    This template is a minimal, generic public-page wrapper (just <head> +
    <body> + blocks) with NO nav/branding/auth markup of its own, so the
    landing page's own single navbar/hero/etc. is the only copy rendered.
    base.html itself is left untouched, since it is still needed as-is for
    the authenticated patient/provider/admin dashboard pages.
-->
{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Digital Health Insurance Claims Management System{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    {% block extra_css %}{% endblock %}
</head>
<body>

    {% block content %}{% endblock %}

    <!-- Bootstrap JS bundle: required for the navbar toggler and the FAQ
         accordion (data-bs-toggle="collapse") that already exist in
         landing.html to actually work. Neither base.html nor landing.html
         previously loaded it. -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
